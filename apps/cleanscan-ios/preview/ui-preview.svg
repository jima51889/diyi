      .ink{fill:#121417}
      .muted{fill:#6b7280}
      .phone{fill:#111317}
      .screen{fill:#f9fafb}
      .card{fill:#fff;stroke:#e7ebf0;stroke-width:1}
      .soft{fill:#e8edf4}
      .blue{fill:#1769ff}
      .green{fill:#18a058}
      .line{fill:#cbd5e1}
      .label{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;font-size:18px;font-weight:700;fill:#374151}
      .h1{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;font-size:36px;font-weight:800;fill:#121417}
