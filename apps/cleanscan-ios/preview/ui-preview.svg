<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="980" viewBox="0 0 1440 980">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#16202f" flood-opacity="0.18"/>
    </filter>
    <linearGradient id="blueGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1769ff"/>
      <stop offset="1" stop-color="#18a058"/>
    </linearGradient>
    <linearGradient id="docPaper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e2eaf5"/>
